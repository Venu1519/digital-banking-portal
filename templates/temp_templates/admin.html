<h2>Admin Dashboard</h2>

<h3>Users</h3>
<table border="1" cellpadding="10">
    <tr>
        <th>ID</th>
        <th>Username</th>
        <th>Balance</th>
    </tr>

    {% for user in users %}
    <tr>
        <td>{{ user[0] }}</td>
        <td>{{ user[1] }}</td>
        <td>₹{{ user[2] }}</td>
    </tr>
    {% endfor %}
</table>

<br>

<h3>Transactions</h3>
<table border="1" cellpadding="10">
    <tr>
        <th>ID</th>
        <th>Sender</th>
        <th>Receiver</th>
        <th>Amount</th>
        <th>Date</th>
    </tr>

    {% for t in transactions %}
    <tr>
        <td>{{ t[0] }}</td>
        <td>{{ t[1] }}</td>
        <td>{{ t[2] }}</td>
        <td>₹{{ t[3] }}</td>
        <td>{{ t[4] }}</td>
    </tr>
    {% endfor %}
</table>

<br>
